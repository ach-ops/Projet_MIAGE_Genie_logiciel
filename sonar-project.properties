# SonarQube configuration
sonar.projectKey=ach-ops_Projet_MIAGE_Genie_logiciel
sonar.organization=ach-ops

# Language
sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info

# Sources
sonar.sources=backend,frontend/src
sonar.tests=backend/tests,frontend/src/__tests__

# Exclusions
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/coverage/**,\
  backend/data/**,\
  backend/tests/**,\
  frontend/src/__tests__/**,\
  **/*.min.js

sonar.test.exclusions=\
  **/node_modules/**,\
  **/dist/**

sonar.coverage.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  backend/tests/**,\
  frontend/src/__tests__/**,\
  frontend/src/main.ts,\
  backend/index.js

# Coverage (lcov généré par Vitest)
sonar.javascript.lcov.reportPaths=\
  backend/coverage/lcov.info,\
  frontend/coverage/lcov.info

# Encodage
sonar.sourceEncoding=UTF-8
