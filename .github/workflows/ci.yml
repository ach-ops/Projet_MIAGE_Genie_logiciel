name: CI

on:
  pull_request:
    branches: [dev, staging, main]
  push:
    branches: [dev, staging, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────────
# BACKEND
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  backend-lint:
    name: Backend — Lint (syntax check)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Oxlint
        working-directory: backend
        run: npm run lint

      - name: Security audit
        working-directory: backend
        run: npm audit --audit-level=high

  backend-test:
    name: Backend — Unit & Integration tests
    runs-on: ubuntu-latest
    needs: backend-lint

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Run tests with coverage
        working-directory: backend
        run: npm run test:coverage
        env:
          NODE_ENV: test

      - name: Upload coverage report
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage/
          retention-days: 7

# ─────────────────────────────────────────────────────────────────────────────
# FRONTEND
# ─────────────────────────────────────────────────────────────────────────────
  frontend-lint:
    name: Frontend — Lint & Type check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Oxlint
        working-directory: frontend
        run: npm run lint

      - name: Prettier format check
        working-directory: frontend
        run: npx prettier --check src/

      - name: Security audit
        working-directory: frontend
        run: npm audit --audit-level=high

  frontend-build:
    name: Frontend — Build
    runs-on: ubuntu-latest
    needs: frontend-lint

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          NODE_ENV: production

      - name: Upload build artifact
        uses: actions/upload-artifact@v5
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

# ─────────────────────────────────────────────────────────────────────────────
# SONARCLOUD
# ─────────────────────────────────────────────────────────────────────────────
  sonar:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: backend-test

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download backend coverage
        uses: actions/download-artifact@v5
        with:
          name: backend-coverage
          path: backend/coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

# ─────────────────────────────────────────────────────────────────────────────
# GATE FINALE — tous les jobs doivent passer pour merger
# ─────────────────────────────────────────────────────────────────────────────
  all-checks:
    name: All checks passed
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build, sonar]
    if: always()

    steps:
      - name: Check all jobs succeeded
        run: |
          if [[ "${{ needs.backend-test.result }}" != "success" || \
                "${{ needs.frontend-build.result }}" != "success" || \
                "${{ needs.sonar.result }}" != "success" ]]; then
            echo "One or more jobs failed."
            exit 1
          fi
          echo "All checks passed."
